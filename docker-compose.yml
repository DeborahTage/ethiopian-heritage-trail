services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: heritage_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-heritage_trail}
      POSTGRES_USER: ${POSTGRES_USER:-heritage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-heritage_secret}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-heritage} -d ${POSTGRES_DB:-heritage_trail}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - heritage_net

  redis:
    image: redis:7-alpine
    container_name: heritage_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-redis_secret}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - heritage_net

  minio:
    image: minio/minio:latest
    container_name: heritage_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret_123}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - heritage_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: heritage_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-heritage_trail}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-heritage}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-heritage_secret}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_secret_123}
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production_aabbccdd00112233}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-900000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
    ports:
      - "8080:8080"
    networks:
      - heritage_net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  heritage_net:
    driver: bridge
