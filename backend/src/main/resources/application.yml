spring:
  application:
    name: ethiopian-heritage-trail

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/heritage_trail}
    username: ${SPRING_DATASOURCE_USERNAME:heritage}
    password: ${SPRING_DATASOURCE_PASSWORD:heritage_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:redis_secret}

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# Application-level config
app:
  jwt:
    secret: ${JWT_SECRET:changeme_in_production_aabbccdd00112233aabbccdd00112233}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    cdn-domain: ${CDN_DOMAIN:${MINIO_ENDPOINT:http://localhost:9000}}
    access-key: ${MINIO_ACCESS_KEY:minio_admin}
    secret-key: ${MINIO_SECRET_KEY:minio_secret_123}
    bucket: ${MINIO_BUCKET:heritage-media}

  firebase:
    project-id: ${FIREBASE_PROJECT_ID:}
    service-account-key-path: ${FIREBASE_SERVICE_ACCOUNT_KEY_PATH:}

  rate-limit:
    visit-ttl-minutes: 30

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
  flyway:
    locations: classpath:db/migration

logging:
  level:
    com.trail.heritage: DEBUG
    org.springframework.security: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false

logging:
  level:
    com.trail.heritage: INFO
    root: WARN
