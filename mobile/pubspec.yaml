name: ethiopian_heritage_trail
description: Ethiopian Heritage Trail — geo-fenced QR tourism passport app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.2.0

  # HTTP
  dio: ^5.7.0
  retrofit: ^4.4.1

  # QR Scanning
  mobile_scanner: ^6.0.0

  # Storage & Offline
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.2.1

  # Maps
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  percent_indicator: ^4.2.3
  badges: ^3.1.2

  # Utils
  intl: ^0.19.0
  logger: ^2.4.0
  json_annotation: ^4.9.0
  share_plus: ^12.0.2
  video_player: ^2.11.1
  audioplayers: ^6.6.0
  path_provider: ^2.1.5
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
