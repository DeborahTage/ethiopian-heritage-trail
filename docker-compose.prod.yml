version: '3.8'

services:
  eht-postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: eht-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-heritage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-heritage_secret}
      POSTGRES_DB: ${POSTGRES_DB:-heritage_trail}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  eht-redis:
    image: redis:7-alpine
    container_name: eht-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    volumes:
      - redisdata:/data
    restart: always

  eht-minio:
    image: minio/minio:latest
    container_name: eht-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret_123}
    volumes:
      - miniodata:/data
    restart: always

  eht-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eht-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://eht-postgres:5432/${POSTGRES_DB:-heritage_trail}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-heritage}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-heritage_secret}
      SPRING_DATA_REDIS_HOST: eht-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      MINIO_ENDPOINT: http://eht-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_secret_123}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-900000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
    depends_on:
      - eht-postgres
      - eht-redis
      - eht-minio
    restart: always

  eht-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: eht-dashboard
    depends_on:
      - eht-backend
    restart: always

  eht-nginx:
    image: nginx:alpine
    container_name: eht-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - eht-backend
      - eht-dashboard
    restart: always

volumes:
  pgdata:
  redisdata:
  miniodata:
